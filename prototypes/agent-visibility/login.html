<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Ops Studio Login</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 0%, #f5f8ff 0%, #e6ecf7 45%, #d8e0ee 100%);
        font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
      }
      .card {
        width: min(92vw, 360px);
        border: 1px solid #cdd8ea;
        border-radius: 14px;
        padding: 18px;
        background: white;
        box-shadow: 0 10px 30px rgba(30, 50, 80, 0.15);
      }
      h1 { margin: 0 0 12px; font-size: 18px; }
      .sub { color: #64748b; font-size: 13px; margin-bottom: 12px; }
      input {
        width: 100%;
        margin-bottom: 10px;
        padding: 9px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 9px 10px;
        border: 0;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      #msg { margin-top: 10px; font-size: 13px; color: #b91c1c; min-height: 18px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>登录 Agent Ops Studio</h1>
      <div class="sub">请输入账号密码后进入控制台</div>
      <input id="u" placeholder="账号" />
      <input id="p" type="password" placeholder="密码" />
      <button id="login">登录</button>
      <div id="msg"></div>
    </div>

    <script>
      async function check() {
        try {
          const r = await fetch('/auth/me');
          const j = await r.json();
          if (j.authed) location.href = '/';
        } catch {}
      }
      async function submit() {
        const username = document.getElementById('u').value.trim();
        const password = document.getElementById('p').value;
        const msg = document.getElementById('msg');
        msg.textContent = '';
        try {
          const r = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          if (!r.ok) {
            msg.textContent = '账号或密码错误';
            return;
          }
          location.href = '/';
        } catch {
          msg.textContent = '登录失败，请重试';
        }
      }
      document.getElementById('login').onclick = submit;
      document.getElementById('p').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
      });
      check();
    </script>
  </body>
</html>
