<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Ops Studio</title>
    <style>
      :root {
        --bg: #ebe7df;
        --panel: #f9f7f2;
        --ink: #1f2a37;
        --muted: #6b7280;
        --line: #d6d1c7;
        --brand: #0e7490;
        --ok: #166534;
        --warn: #b45309;
        --danger: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 0%, #f7f4ee 0%, #ece8df 40%, #e2ddd2 100%);
      }
      .app { max-width: 1450px; margin: 0 auto; padding: 14px; }
      .topbar {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        padding: 12px;
      }
      .title { font-weight: 700; }
      .badge {
        font-size: 12px;
        border-radius: 999px;
        padding: 5px 10px;
        border: 1px solid transparent;
      }
      .badge.run { background: #dcfce7; color: var(--ok); border-color: #86efac; }
      .badge.pause { background: #fef3c7; color: var(--warn); border-color: #fcd34d; }
      .badge.stop, .badge.fail { background: #fee2e2; color: var(--danger); border-color: #fca5a5; }
      .badge.off { background: #e5e7eb; color: #374151; border-color: #cbd5e1; }
      button {
        border: 0;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
        color: white;
        background: var(--brand);
      }
      .danger { background: var(--danger); }
      .layout {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 320px 1fr 340px;
        gap: 12px;
      }
      .panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        overflow: hidden;
      }
      .panel h3 {
        margin: 0;
        padding: 10px 12px;
        font-size: 14px;
        background: #f2eee7;
        border-bottom: 1px solid var(--line);
      }
      .content { padding: 10px 12px; }

      .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
      .filters button {
        background: #e5e7eb;
        color: #374151;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
      }
      .filters .active { background: #dbeafe; color: #1d4ed8; }
      .timeline-scroller {
        max-height: 70vh;
        overflow-y: auto;
        padding-right: 4px;
        scroll-behavior: smooth;
      }
      .timeline-item {
        border: 1px solid #dbe3ef;
        background: #ffffff;
        border-radius: 12px;
        padding: 8px 10px;
        margin: 7px 0;
        cursor: pointer;
        width: 88%;
      }
      .timeline-item.right {
        margin-left: auto;
        background: #eaf3ff;
        border-color: #c7dbff;
      }
      .timeline-item.high { border-color: #fca5a5; background: #fff1f2; }
      .timeline-item.medium { border-color: #fcd34d; background: #fffbeb; }
      .t-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

      .studio {
        border: 1px solid #5f4a37;
        border-radius: 12px;
        background: radial-gradient(circle at 50% -20%, #3e2f25 0%, #2f241d 40%, #241b15 100%);
        color: #f9f2e7;
        padding: 12px;
        box-shadow: inset 0 1px 0 rgba(255, 235, 210, 0.2), 0 12px 30px rgba(36, 27, 21, 0.35);
      }
      .studio-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      .studio-note { font-size: 12px; color: #eadfcf; }
      .lane {
        border: 1px solid #8f6f53;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(255, 244, 227, 0.12), rgba(255, 244, 227, 0.05));
        padding: 8px;
        margin-bottom: 10px;
        transform: perspective(900px) rotateX(6deg);
        transform-origin: center top;
      }
      .lane-head {
        display: grid;
        grid-template-columns: 130px 1fr 120px;
        gap: 8px;
        align-items: center;
        margin-bottom: 6px;
      }
      .agent-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #94a3b8;
      }
      .dot.exec { background: #22c55e; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); animation: pulse 1.2s infinite; }
      .dot.block { background: #ef4444; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); animation: pulse 1s infinite; }
      .dot.idle { background: #94a3b8; }

      .stations { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; position: relative; }
      .stations::before {
        content: "";
        position: absolute;
        left: 2%;
        right: 2%;
        top: 50%;
        height: 2px;
        background: linear-gradient(90deg, rgba(190,160,130,0.15), rgba(240,210,170,0.65), rgba(190,160,130,0.15));
        transform: translateY(-50%);
        z-index: 0;
      }
      .station {
        border: 1px solid #a27a56;
        border-radius: 8px;
        padding: 6px;
        text-align: center;
        font-size: 11px;
        background: rgba(255, 245, 230, 0.14);
        position: relative;
        z-index: 1;
      }
      .station.active {
        border-color: #5eead4;
        background: rgba(45, 212, 191, 0.2);
        animation: drift 1.6s infinite alternate ease-in-out;
      }
      .queue {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .q-item {
        font-size: 10px;
        border: 1px solid #93c5fd;
        background: rgba(147, 197, 253, 0.2);
        border-radius: 999px;
        padding: 2px 6px;
      }
      .ring {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #f59e0b;
        opacity: 0;
      }
      .ring.on { opacity: 1; animation: bell 1.1s infinite; }

      .kpi { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 10px; }
      .kpi div { border: 1px solid var(--line); border-radius: 8px; padding: 7px; background: #fdfcf9; }
      .small { font-size: 12px; color: var(--muted); }
      pre {
        margin: 0;
        background: #111827;
        color: #e5e7eb;
        border-radius: 10px;
        min-height: 170px;
        max-height: 260px;
        overflow: auto;
        padding: 10px;
      }
      .risk-card {
        border: 1px solid #fcd34d;
        border-radius: 8px;
        background: #fffbeb;
        padding: 8px;
        margin: 10px 0;
      }
      .artifacts { display: flex; gap: 6px; flex-wrap: wrap; }
      .artifact { font-size: 12px; border-radius: 999px; padding: 4px 9px; border: 1px solid #a5f3fc; background: #ecfeff; }

      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55); }
        100% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
      }
      @keyframes drift {
        from { transform: translateY(0px); }
        to { transform: translateY(-2px); }
      }
      @keyframes bell {
        0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); transform: scale(1); }
        100% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); transform: scale(1.15); }
      }
      @media (max-width: 1120px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="title">Agent Ops Studio · session <span id="sessionKey">agent:main:main</span></div>
        <div class="badge run" id="status">RUNNING</div>
        <div class="badge run" id="conn">CONNECTED</div>
        <div>
          <button id="pauseBtn">Pause</button>
          <button id="stopBtn" class="danger">Stop</button>
        </div>
      </div>

      <div class="layout">
        <section class="panel">
          <h3>事件时间线</h3>
          <div class="content">
            <div class="filters" id="filters"></div>
            <div class="timeline-scroller" id="timelineScroller">
              <div id="timeline"></div>
            </div>
          </div>
        </section>

        <section class="studio">
          <div class="studio-head">
            <div><strong>行动剧场</strong></div>
            <div class="studio-note">单智能体拟人可视化：我现在在做什么、为什么、下一步是什么</div>
          </div>
          <div id="lanes"></div>
        </section>

        <section class="panel">
          <h3>Inspector</h3>
          <div class="content">
            <div class="kpi">
              <div><div class="small">Elapsed</div><strong id="elapsed">0s</strong></div>
              <div><div class="small">Tokens</div><strong id="tokens">0</strong></div>
              <div><div class="small">Cost</div><strong id="cost">$0.0000</strong></div>
              <div><div class="small">Retry</div><strong id="retry">0</strong></div>
            </div>

            <div><strong id="focusTitle">等待事件...</strong></div>
            <div class="small" id="focusWhy">why: -</div>
            <div class="small" id="focusNext">next: -</div>

            <div class="risk-card" id="risk">风险: low</div>
            <pre id="stdout"></pre>

            <div style="margin-top:10px;"><strong>Artifacts</strong></div>
            <div class="artifacts" id="artifacts"></div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const state = {
        start: Date.now(),
        paused: false,
        connected: false,
        stream: null,
        filter: "all",
        tokens: 0,
        cost: 0,
        retry: 0,
        events: [],
        timelineStickToBottom: true
      };

      const stations = ["Planning", "Search", "Build", "Verify", "Delivery"];
      const agents = [
        { id: "agent-main", name: "我", status: "idle", active: "Planning", queue: [], ring: false }
      ];
      const agentMap = Object.fromEntries(agents.map((a) => [a.id, a]));

      const el = {
        status: document.getElementById("status"),
        conn: document.getElementById("conn"),
        pauseBtn: document.getElementById("pauseBtn"),
        stopBtn: document.getElementById("stopBtn"),
        timeline: document.getElementById("timeline"),
        timelineScroller: document.getElementById("timelineScroller"),
        lanes: document.getElementById("lanes"),
        elapsed: document.getElementById("elapsed"),
        tokens: document.getElementById("tokens"),
        cost: document.getElementById("cost"),
        retry: document.getElementById("retry"),
        focusTitle: document.getElementById("focusTitle"),
        focusWhy: document.getElementById("focusWhy"),
        focusNext: document.getElementById("focusNext"),
        risk: document.getElementById("risk"),
        stdout: document.getElementById("stdout"),
        artifacts: document.getElementById("artifacts"),
        filters: document.getElementById("filters"),
        sessionKey: document.getElementById("sessionKey")
      };

      const filterDefs = ["all", "tool", "risk", "file", "error"];

      function renderFilters() {
        el.filters.innerHTML = filterDefs
          .map((f) => `<button class="${state.filter === f ? "active" : ""}" data-filter="${f}">${f}</button>`)
          .join("");
        [...el.filters.querySelectorAll("button")].forEach((b) => {
          b.onclick = () => {
            state.filter = b.dataset.filter;
            renderFilters();
            renderTimeline();
          };
        });
      }

      function stationFromEvent(evt) {
        const t = (evt.title || "").toLowerCase();
        if (t.includes("search") || t.includes("web") || t.includes("read") || t.includes("检索")) return "Search";
        if (t.includes("build") || t.includes("write") || t.includes("edit") || t.includes("生成") || t.includes("更新")) return "Build";
        if (t.includes("verify") || t.includes("test") || t.includes("检查")) return "Verify";
        if (t.includes("deliver") || t.includes("send") || t.includes("回复")) return "Delivery";
        return "Planning";
      }

      function canonicalAgentId(id) {
        return agentMap[id] ? id : "agent-main";
      }

      function renderLanes() {
        const a = agents[0];
        const queue = a.queue.slice(0, 5).map((q) => `<span class="q-item">${q}</span>`).join("");
        const s = stations
          .map((x) => `<div class="station ${a.active === x && a.status === "exec" ? "active" : ""}">${x}</div>`)
          .join("");
        const doing = a.status === "exec" ? `正在${a.active}` : a.status === "block" ? "遇到阻塞" : "待命中";

        el.lanes.innerHTML = `
          <div class="lane" data-agent="${a.id}">
            <div class="lane-head">
              <div class="agent-chip"><span class="dot ${a.status === "exec" ? "exec" : a.status === "block" ? "block" : "idle"}"></span>${a.name}</div>
              <div class="queue">${queue}</div>
              <div style="display:flex;justify-content:flex-end;"><div class="ring ${a.ring ? "on" : ""}"></div></div>
            </div>
            <div class="t-sub" style="color:#f6e8d4;margin-bottom:8px;">角色状态：${doing}</div>
            <div class="stations">${s}</div>
          </div>
        `;
      }

      function eventKind(e) {
        if (e.event && e.event.includes("tool")) return "tool";
        if (e.event === "file.changed" || e.event === "artifact.created") return "file";
        if (e.event && (e.event.includes("error") || e.event.includes("failed"))) return "error";
        if (e.risk === "high" || e.event === "approval.required") return "risk";
        return "all";
      }

      function filteredEvents() {
        if (state.filter === "all") return state.events;
        return state.events.filter((e) => eventKind(e) === state.filter);
      }

      function renderTimeline() {
        const list = filteredEvents().slice(-140);
        const nearBottom = el.timelineScroller.scrollHeight - el.timelineScroller.scrollTop - el.timelineScroller.clientHeight < 36;
        if (nearBottom) state.timelineStickToBottom = true;

        let prevBucket = "";
        el.timeline.innerHTML = list
          .map((e, idx) => {
            const ts = new Date(e._ts || Date.now());
            const bucket = `${ts.getFullYear()}-${ts.getMonth() + 1}-${ts.getDate()} ${ts.getHours()}:${ts.getMinutes()}`;
            const showBucket = bucket !== prevBucket;
            prevBucket = bucket;

            const clsRisk = e.risk === "high" ? "high" : e.risk === "medium" ? "medium" : "";
            const side = idx % 2 === 0 ? "left" : "right";
            const cls = `${clsRisk} ${side}`.trim();
            const title = e.title || e.event;
            const sub = (e.payload && (e.payload.out || e.payload.why)) || "-";
            const time = ts.toLocaleTimeString();
            return `${showBucket ? `<div class="small" style="text-align:center;margin:10px 0 6px 0;">${bucket}</div>` : ""}<div class="timeline-item ${cls}" data-i="${idx}"><div><strong>${title}</strong></div><div class="t-sub">${sub}</div><div class="t-sub">${time}</div></div>`;
          })
          .join("");

        [...el.timeline.querySelectorAll(".timeline-item")].forEach((n) => {
          n.onclick = () => {
            const e = list[Number(n.dataset.i)];
            focus(e);
          };
        });

        if (state.timelineStickToBottom) {
          el.timelineScroller.scrollTop = el.timelineScroller.scrollHeight;
        }
      }

      function focus(e) {
        if (!e) return;
        el.focusTitle.textContent = e.title || e.event;
        el.focusWhy.textContent = `why: ${e.payload?.why || "-"}`;
        el.focusNext.textContent = `next: ${e.payload?.next || "-"}`;
        const risk = e.risk || (e.event === "approval.required" ? "high" : "low");
        el.risk.textContent = `风险: ${risk}`;
        if (risk === "high") {
          el.risk.style.borderColor = "#ef4444";
          el.risk.style.background = "#fef2f2";
        } else if (risk === "medium") {
          el.risk.style.borderColor = "#f59e0b";
          el.risk.style.background = "#fffbeb";
        } else {
          el.risk.style.borderColor = "#fcd34d";
          el.risk.style.background = "#fffbeb";
        }
      }

      function pushStdout(text) {
        el.stdout.textContent += `[${new Date().toLocaleTimeString()}] ${text}\n`;
        el.stdout.scrollTop = el.stdout.scrollHeight;
      }

      function addArtifact(name) {
        if (!name) return;
        const tag = document.createElement("span");
        tag.className = "artifact";
        tag.textContent = name;
        el.artifacts.prepend(tag);
      }

      function setStatus(text, cls) {
        el.status.textContent = text;
        el.status.className = `badge ${cls}`;
      }

      function setConn(text, cls) {
        el.conn.textContent = text;
        el.conn.className = `badge ${cls}`;
      }

      function onEvent(evt) {
        if (!evt || state.paused) return;
        evt._ts = evt._ts || Date.now();
        state.events.push(evt);
        if (state.events.length > 600) state.events.shift();

        if (evt.event === "session.started") setStatus("RUNNING", "run");
        if (evt.event === "session.completed") setStatus("COMPLETED", "run");
        if (evt.event === "session.failed") setStatus("FAILED", "fail");

        if (evt.event === "cost.updated") {
          state.tokens = evt.payload?.tokens || state.tokens;
          state.cost = evt.payload?.cost || state.cost;
          state.retry = evt.payload?.retry || state.retry;
        }

        if (evt.event === "artifact.created" || evt.event === "file.changed") {
          addArtifact(evt.payload?.name || evt.payload?.path || "artifact");
        }

        if (evt.event === "queue.updated") {
          const id = canonicalAgentId(evt.payload?.agentId);
          if (agentMap[id]) agentMap[id].queue = evt.payload?.items || [];
        }

        if (["step.started", "tool.started"].includes(evt.event)) {
          const id = canonicalAgentId(evt.payload?.agentId || "agent-main");
          const a = agentMap[id];
          if (a) {
            a.status = "exec";
            a.active = stationFromEvent(evt);
            if (evt.payload?.scheduled) {
              a.ring = true;
              setTimeout(() => { a.ring = false; renderLanes(); }, 1800);
            }
          }
          pushStdout(evt.payload?.out || evt.title || evt.event);
          focus(evt);
        }

        if (["step.completed", "tool.completed"].includes(evt.event)) {
          const id = canonicalAgentId(evt.payload?.agentId || "agent-main");
          if (agentMap[id] && agentMap[id].status !== "block") agentMap[id].status = "idle";
        }

        if (["tool.error", "session.failed"].includes(evt.event)) {
          const id = canonicalAgentId(evt.payload?.agentId || "agent-main");
          if (agentMap[id]) agentMap[id].status = "block";
          pushStdout(evt.payload?.out || "error");
          focus(evt);
        }

        if (evt.event === "approval.required") {
          focus({ ...evt, risk: "high", title: evt.title || "需要审批" });
          pushStdout(evt.payload?.reason || "approval required");
        }

        renderLanes();
        renderTimeline();
      }

      function connect() {
        const p = new URLSearchParams(location.search);
        const sk = p.get("sessionKey") || "agent:main:main";
        el.sessionKey.textContent = sk;
        const url = p.get("stream") || `/api/agent-events?sessionKey=${encodeURIComponent(sk)}`;

        const es = new EventSource(url);
        state.stream = es;

        es.onopen = () => {
          state.connected = true;
          setConn("CONNECTED", "run");
          if (!state.paused) setStatus("RUNNING", "run");
          pushStdout(`connected -> ${url}`);
        };

        es.onmessage = (msg) => {
          try {
            const evt = JSON.parse(msg.data);
            onEvent(evt);
          } catch {
            pushStdout(`invalid event: ${msg.data}`);
          }
        };

        es.onerror = () => {
          state.connected = false;
          setConn("DISCONNECTED", "off");
          if (!state.paused) setStatus("OFFLINE", "off");
        };
      }

      function tick() {
        const sec = Math.floor((Date.now() - state.start) / 1000);
        el.elapsed.textContent = `${sec}s`;
        el.tokens.textContent = String(state.tokens);
        el.cost.textContent = `$${Number(state.cost || 0).toFixed(4)}`;
        el.retry.textContent = String(state.retry);
      }

      el.pauseBtn.onclick = () => {
        state.paused = !state.paused;
        el.pauseBtn.textContent = state.paused ? "Resume" : "Pause";
        if (state.paused) {
          setStatus("PAUSED", "pause");
          agents.forEach((a) => { if (a.status !== "block") a.status = "idle"; });
          renderLanes();
        } else {
          setStatus(state.connected ? "RUNNING" : "OFFLINE", state.connected ? "run" : "off");
        }
      };

      el.stopBtn.onclick = () => {
        state.paused = true;
        setStatus("STOPPED", "stop");
        if (state.stream) state.stream.close();
        pushStdout("session stopped by operator");
      };

      el.timelineScroller.addEventListener("scroll", () => {
        const delta = el.timelineScroller.scrollHeight - el.timelineScroller.scrollTop - el.timelineScroller.clientHeight;
        state.timelineStickToBottom = delta < 36;
      });

      renderFilters();
      renderLanes();
      renderTimeline();
      connect();
      setInterval(tick, 400);
    </script>
  </body>
</html>
